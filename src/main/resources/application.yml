server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: contract-approval-system
  datasource:
    url: jdbc:h2:file:./data/contract;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

contract:
  upload:
    path: ./uploads/
